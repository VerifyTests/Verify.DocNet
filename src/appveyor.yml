image:
- Visual Studio 2022
- Ubuntu2204
- macos
environment:
  DOTNET_NOLOGO: true
  DOTNET_CLI_TELEMETRY_OPTOUT: true
  DOTNET_SKIP_FIRST_TIME_EXPERIENCE: true
install:
- pwsh: |
    if ($IsWindows) {
      Invoke-WebRequest "https://archive.apache.org/dist/xmlgraphics/fop/binaries/fop-2.11-bin.zip" -OutFile fop.zip
      Expand-Archive fop.zip -DestinationPath C:\fop
      appveyor SetVariable -Name FOP_HOME -Value 'C:\fop\fop-2.11\fop'
    } elseif ($IsMacOS) {
      brew install fop
    } else {
      sudo apt-get update
      sudo apt-get install -y fop
    }
build_script:
- pwsh: |
    if ($IsWindows) {
      Invoke-WebRequest "https://dot.net/v1/dotnet-install.ps1" -OutFile "./dotnet-install.ps1"
      ./dotnet-install.ps1 -JSonFile global.json -Architecture x64 -InstallDir 'C:\Program Files\dotnet'
    } else {
      Invoke-WebRequest "https://dot.net/v1/dotnet-install.sh" -OutFile "./dotnet-install.sh"
      bash ./dotnet-install.sh --jsonfile global.json --install-dir "$HOME/.dotnet"
      $env:PATH = "$HOME/.dotnet" + [IO.Path]::PathSeparator + $env:PATH
    }
    dotnet build src --configuration Release
    if ($LASTEXITCODE -ne 0) { exit $LASTEXITCODE }
    dotnet test src --configuration Release --no-build --no-restore --report-trx
    if ($LASTEXITCODE -ne 0) { exit $LASTEXITCODE }
test: off
on_finish:
- pwsh: |
    $wc = New-Object System.Net.WebClient
    Get-ChildItem TestResults -Filter *.trx -Recurse | ForEach-Object {
      $wc.UploadFile("https://ci.appveyor.com/api/testresults/mstest/$env:APPVEYOR_JOB_ID", $_.FullName)
    }
artifacts:
- path: nugets\*.nupkg
on_failure:
  - pwsh: |
      $root = (Get-Location).Path
      Get-ChildItem *.received.* -Recurse | % {
        $rel = $_.FullName.Substring($root.Length + 1)
        Push-AppveyorArtifact $_.FullName -FileName $rel
      }
